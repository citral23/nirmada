---
name: Promote channel

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Channel to promote to"
        type: choice
        options: [beta, stable]
        required: true
      source:
        description: "Source tag to promote from (e.g. testing or testing.20260608)"
        type: string
        default: testing
      version:
        description: "Optional release version (e.g. 1.0). Set when cutting a release: keeps an immutable :<version> tag as the permanent pin for the downloadable disk image."
        type: string
        default: ""

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

concurrency:
  group: ${{ github.workflow }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  promote:
    name: Promote ${{ inputs.source }} -> ${{ inputs.target }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"
          command -v skopeo >/dev/null || { sudo apt-get update && sudo apt-get install -y skopeo; }

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Refuse to promote an unsigned image
        id: resolve
        run: |
          set -euxo pipefail
          REPO="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          # Pin to the digest so verify and the retag below act on the same image
          # even if a concurrent build re-points the source tag in between.
          DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${REPO}:${{ inputs.source }}")
          # Fail closed: never promote an unsigned build into beta/stable.
          cosign verify --key system_files/etc/pki/containers/nirmada.pub "${REPO}@${DIGEST}"
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: Promote (retag by digest — preserves digest, so the cosign signature carries)
        run: |
          set -euxo pipefail
          REPO="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          SRC="${REPO}@${{ steps.resolve.outputs.digest }}"
          promote() { skopeo copy --all "docker://${SRC}" "docker://${REPO}:$1"; }

          promote "${{ inputs.target }}"

          # stable doubles as :latest for tooling that expects it.
          if [ "${{ inputs.target }}" = stable ]; then
            promote latest
          fi

          # Tag the release.
          if [ -n "${{ inputs.version }}" ]; then
            promote "${{ inputs.version }}"
          fi
